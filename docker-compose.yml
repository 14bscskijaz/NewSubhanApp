# Local development compose — builds images from source.
# Usage:
#   1. Copy .env.example to .env and fill in values.
#   2. docker compose up --build

services:

  # ── Database ────────────────────────────────────────────────────────────────
  postgres-rdbms:
    image: postgres:17-alpine
    container_name: accounts_${DEPLOYMENT_ENV}_postgres
    ports:
      - "${DB_EXPOSE_HOST:-127.0.0.1}:${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_NAME:-postgres}"
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-changeme}"
    volumes:
      - accounts_data:/var/lib/postgresql/data
      # Optional: Init scripts
      # - ./postgres/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - accounts_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # ── Backend (.NET 6) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./BusServiceAPI
      dockerfile: Dockerfile
    image: accounts-backend:latest
    container_name: accounts_${DEPLOYMENT_ENV}_backend
    ports:
      - "${BACKEND_PORT:-5072}:5072"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://0.0.0.0:${BACKEND_PORT:-5072}"
      ConnectionStrings__DefaultConnection: "Host=postgres-rdbms;Port=5432;Database=${DB_NAME:-postgres};Username=${DB_USER:-subhan_user};Password=${DB_PASSWORD:-lolpass123}"
      # Optional: override the CORS origins baked into appsettings without rebuilding the image.
      # Uses ASP.NET Core's double-underscore convention for array elements.
      # Cors__AllowedOrigins__0: "${CORS_ORIGIN_0}"
      # Cors__AllowedOrigins__1: "${CORS_ORIGIN_1}"
    depends_on:
      postgres-rdbms:
        condition: service_healthy
    networks:
      - accounts_network
    restart: unless-stopped

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked into the JS bundle at build time.
        # For local dev the backend is reachable at http://backend:5072
        # (the browser connects directly, not through Docker networking).
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:5072/api}
        NEXT_PUBLIC_HARDCODED_EMAIL: ${NEXT_PUBLIC_HARDCODED_EMAIL:-newsubhan@gmail.com}
        NEXT_PUBLIC_HARDCODED_PASSWORD: ${NEXT_PUBLIC_HARDCODED_PASSWORD:-Subh@nPass#144}
    container_name: accounts_${DEPLOYMENT_ENV}_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    # File accessible to the container at runtime (e.g. for server-side env vars like AUTH_SECRET)
    env_file:
      - .env                         # written by the CI workflow from GitHub Secrets
    environment:
      # Runtime vars — safe to inject at container start.
      AUTH_TRUST_HOST: "true"
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET}
      GITHUB_ID: ${GITHUB_ID:-}
      GITHUB_SECRET: ${GITHUB_SECRET:-}
      NEXT_PUBLIC_HARDCODED_EMAIL: ${NEXT_PUBLIC_HARDCODED_EMAIL:-}
      NEXT_PUBLIC_HARDCODED_PASSWORD: ${NEXT_PUBLIC_HARDCODED_PASSWORD:-}
      # Server-side Next.js (SSR/server actions) runs inside this container,
      # so it must reach the backend via the Docker service name, not localhost.
      # This runtime value overrides process.env for server-side code only;
      # client-side JS still uses the value baked in at build time (localhost:7169).
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:5072/api}
    depends_on:
      - backend
    networks:
      - accounts_network

networks:
  accounts_network:
    driver: bridge
    name: accounts_${DEPLOYMENT_ENV}_network

volumes:
  accounts_data:
    driver: local
    name: accounts_${DEPLOYMENT_ENV}_data
